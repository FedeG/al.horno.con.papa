<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sin conexión · Al Horno Con Papá</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #F5F3ED;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .offline-card {
      background: #fff;
      border-radius: 24px;
      padding: 48px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 32px rgba(0,0,0,0.1);
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #C4704F 0%, #B85C3E 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
      color: #fff;
      line-height: 1;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #333;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #666;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #C4704F 0%, #B85C3E 100%);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(196,112,79,0.3);
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon">🍳</div>
    <h1>Sin conexión</h1>
    <p>
      Parece que no tenés internet en este momento.<br />
      Las recetas que ya visitaste siguen disponibles.
    </p>
    <button class="btn" onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
